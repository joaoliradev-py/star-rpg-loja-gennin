<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presente Laranja - Naruto RPG STAR</title>
    <script>
        const isGH = window.location.hostname.includes('github.io');
        document.write(`<base href="${isGH ? '/star-rpg-loja-gennin/' : '/'}">`);
    </script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <!-- NavBar -->
    <script src="assets/navbar.js"></script>
    <!-- fim NavBar -->

    <main class="p-4 md:p-8 bg-[url(assets/images/vale_do_fim.webp)] bg-cover bg-no-repeat bg-fixed min-h-screen bg-center pt-20 flex items-center justify-center">
        <div class="bg-base-100/90 backdrop-blur-md rounded-2xl p-8 mt-10 max-w-md w-full shadow-2xl text-center border border-base-200">
            <h1 class="text-3xl font-black mb-2 uppercase tracking-wider text-primary animate-pulse">🎁 PRESENTE ENCONTRADO! 🎁</h1>
            <p class="text-sm opacity-70 mb-6 font-mono">Evento Especial de Caça aos Presentes</p>

            <div class="relative group my-6">
                <!-- Glowing effect -->
                <div class="absolute -inset-1 bg-gradient-to-r from-orange-600 to-amber-400 rounded-xl blur opacity-30 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                
                <div class="relative bg-base-200 p-4 rounded-xl flex items-center justify-center border border-base-300">
                    <img src="assets/evento_presentes/orange_present.jpeg" alt="Presente Laranja" class="max-h-64 object-contain rounded-lg transition-transform duration-500 group-hover:scale-105 select-none pointer-events-none drop-shadow-[0_0_15px_rgba(249,115,22,0.8)]">
                </div>
            </div>

            <div class="space-y-4 text-sm mt-6">
                <div class="bg-base-300/40 p-4 rounded-lg font-bold border border-base-300">
                    <p class="text-orange-400">Você encontrou o Presente Laranja!</p>
                </div>
                <p class="text-xs opacity-75">Tire um print desta tela ou copie o link da página e envie para um administrador ou Feudal para resgatar sua recompensa!</p>
            </div>

            <button onclick="copyLink()" class="btn btn-primary btn-sm w-full mt-6 gap-2">
                🔗 Copiar Link
            </button>
            <div id="toast" class="hidden text-xs text-success mt-2 font-mono">Link copiado com sucesso!</div>
        </div>
    </main>

    <script>
        function copyLink() {
            navigator.clipboard.writeText(window.location.href);
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 2000);
        }
    </script>
</body>
</html>
